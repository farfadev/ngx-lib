@if(context) {
  <div>
    <input
      [id]="getId()"
      type="color"
      [disabled]="isReadOnly(context)"
      [(ngModel)]="colorPick"
      [class]="getStyleClass(context)"
      [style]="getStyle(context)"
      (click)="onclick()"
      />
      <select
        [(ngModel)]="colorName"
        >
        <option disabled value="">select</option>
        @for (o of getColorNames(); track o) {
          <option
            value="{{ o }}"
            >
            {{ o }}
          </option>
        }
      </select>
    </div>
  }
